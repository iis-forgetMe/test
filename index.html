<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Terminal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: "Cascadia Code", "Fira Code", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #init-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #cat-face {
            font-size: 40px;
            color: #1793d1;
            position: absolute;
            filter: drop-shadow(0 0 10px rgba(23, 147, 209, 0.5));
            animation: instantSquash 0.4s cubic-bezier(0.4, 0, 1, 1) 1s forwards;
            z-index: 50;
        }

        @keyframes instantSquash {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3, 0); opacity: 0; }
        }

        #terminal {
            background-color: #0c0c0c;
            width: 800px;
            height: 480px;
            max-height: 480px;
            border: 1px solid #1793d1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            animation: fluidTerminal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
            z-index: 40;
            transition: 
                max-height 0.7s cubic-bezier(0.7, 0, 0.3, 1), 
                width 0.7s cubic-bezier(0.7, 0, 0.3, 1), 
                padding 0.5s ease,
                opacity 0.3s ease,
                border-color 0.4s ease;
        }

        @keyframes fluidTerminal {
            0% { height: 0; opacity: 1; border-color: #1793d1; }
            100% { height: 480px; opacity: 1; border-color: #222; }
        }

        .is-collapsing {
            max-height: 1px !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            border-color: #1793d1 !important;
            box-shadow: 0 0 20px #1793d1;
        }

        .is-expanding-wide {
            width: 100vw !important;
        }

        #history {
            flex: 1;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInContent 0.5s ease-out 2.2s forwards;
            transition: opacity 0.3s ease;
        }

        @keyframes fadeInContent {
            to { opacity: 1; }
        }

        .input-line {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            transition: opacity 0.3s ease;
        }

        .prompt {
            color: #1793d1;
            font-weight: bold;
        }

        #cmd {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            flex: 1;
        }

        #main-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 20;
        }

        .curtain {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50.5%;
            background: #000;
            z-index: 25;
            transition: transform 0.9s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #curtain-top { top: 0; border-bottom: 1px solid #1793d1; }
        #curtain-bottom { bottom: 0; border-top: 1px solid #1793d1; }

        .reveal-active #curtain-top { transform: translateY(-100%); }
        .reveal-active #curtain-bottom { transform: translateY(100%); }

        .ascii {
            color: #1793d1;
            white-space: pre;
            margin-bottom: 25px;
            font-size: 12px;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div id="init-container">
        <div id="cat-face">:3</div>
        <div id="terminal">
            <div id="history">
                <div class="ascii">
                   .
                  / \
                 /   \
                /^.   \
               /  .-.  \
              /  (   )  \
             /  .-` ^ `-. \
            /  /       \  \
           /__/         \__\
                </div>
                <div>Arch Linux 6.12.1-arch1-1 (tty1)</div>
                <div style="opacity: 0.7;">System state: <span style="color: #ffaa00;">LOCKED</span></div>
                <div style="margin-top: 10px;">Type <span style="color: #fff;">"sudo activate Iris"</span> to proceed.</div>
                <br>
            </div>
            <div class="input-line" id="input-container">
                <span class="prompt">[user@arch ~]$</span>
                <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off">
            </div>
        </div>
    </div>

    <div id="main-page">
        <div id="curtain-top" class="curtain"></div>
        <div id="curtain-bottom" class="curtain"></div>
        
        <div style="padding: 60px; color: #eee;">
            <h1 style="border-bottom: 1px solid #1793d1; padding-bottom: 15px; display: inline-block;">/Iris/bio</h1>
            <p style="margin-top: 20px; font-size: 18px;">Доступ успешно активирован.</p>
            <p style="color: #888;">Вы находитесь в основной директории проекта.</p>
            <button onclick="location.reload()" style="margin-top: 40px; background: transparent; color: #1793d1; border: 1px solid #1793d1; padding: 10px 25px; cursor: pointer;">Выйти</button>
        </div>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd');
        const history = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const terminal = document.getElementById('terminal');
        const mainPage = document.getElementById('main-page');
        const initContainer = document.getElementById('init-container');

        setTimeout(() => {
            inputContainer.style.display = 'flex';
            cmdInput.focus();
        }, 2500);

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                const logLine = document.createElement('div');
                logLine.innerHTML = `<span class="prompt">[user@arch ~]$</span> ${val}`;
                history.appendChild(logLine);

                if (val === 'sudo activate Iris') {
                    const status = document.createElement('div');
                    status.style.color = '#55ff55';
                    status.innerText = 'Authorization successful...';
                    history.appendChild(status);
                    
                    cmdInput.disabled = true;

                    setTimeout(() => {
                        history.style.opacity = '0';
                        inputContainer.style.opacity = '0';
                        
                        setTimeout(() => {
                            terminal.classList.add('is-collapsing');
                            
                            setTimeout(() => {
                                terminal.classList.add('is-expanding-wide');
                                
                                setTimeout(() => {
                                    mainPage.style.display = 'block';
                                    setTimeout(() => {
                                        mainPage.classList.add('reveal-active');
                                        setTimeout(() => {
                                            initContainer.style.display = 'none';
                                        }, 400);
                                    }, 50);
                                }, 750); 
                            }, 700); 
                        }, 200);
                    }, 400);
                } else if (val.toLowerCase() === 'clear') {
                    history.innerHTML = '';
                } else if (val !== '') {
                    const error = document.createElement('div');
                    error.style.color = '#ff5555';
                    error.innerText = (val === 'sudo activate iris') 
                        ? 'Error: Case sensitive. Use "Iris".' 
                        : `sh: command not found: ${val}`;
                    history.appendChild(error);
                }

                cmdInput.value = '';
                history.scrollTop = history.scrollHeight;
            }
        });

        document.addEventListener('click', () => {
            if (mainPage.style.display !== 'block') {
                cmdInput.focus();
            }
        });
    </script>
</body>
</html>
