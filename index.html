<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Terminal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: "Cascadia Code", "Fira Code", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #init-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #cat-face {
            font-size: 40px;
            color: #1793d1;
            position: absolute;
            animation: squash 0.5s ease-in-out 1s forwards;
        }

        @keyframes squash {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5, 0.1); opacity: 1; }
            100% { transform: scale(2, 0); opacity: 0; }
        }

        #line {
            position: absolute;
            height: 2px;
            background-color: #1793d1;
            width: 0;
            opacity: 0;
            animation: growLine 0.5s ease-in-out 1.5s forwards;
        }

        @keyframes growLine {
            0% { width: 0; opacity: 1; }
            100% { width: 800px; opacity: 1; }
        }

        #terminal {
            background-color: #0c0c0c;
            width: 800px;
            height: 0;
            border: 1px solid #222;
            border-radius: 4px;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            animation: growTerminal 0.5s ease-out 2s forwards;
        }

        @keyframes growTerminal {
            0% { height: 0; opacity: 1; padding: 0; }
            100% { height: 480px; opacity: 1; padding: 20px; }
        }

        #history {
            flex: 1;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }

        .input-line {
            display: none;
            align-items: center;
            gap: 10px;
        }

        .prompt {
            color: #1793d1;
            font-weight: bold;
        }

        #cmd {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            flex: 1;
        }

        #main-page {
            display: none;
            width: 100%;
            height: 100vh;
            background: #000;
            color: #fff;
            padding: 50px;
        }

        .visible {
            display: block !important;
        }

        .flex-visible {
            display: flex !important;
        }

        .ascii {
            color: #1793d1;
            white-space: pre;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="init-container">
        <div id="cat-face">:3</div>
        <div id="line"></div>
        <div id="terminal">
            <div id="history">
                <div class="ascii">
                   .
                  / \
                 /   \
                /^.   \
               /  .-.  \
              /  (   )  \
             /  .-` ^ `-. \
            /  /       \  \
           /__/         \__\
                </div>
                <div>Arch Linux 6.12.1-arch1-1 (tty1)</div>
                <div>Type 'sudo activate Iris' to unlock the system.</div>
                <br>
            </div>
            <div class="input-line" id="input-container">
                <span class="prompt">[user@arch ~]$</span>
                <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off">
            </div>
        </div>
    </div>

    <div id="main-page">
        <h1 style="border-bottom: 1px solid #333; padding-bottom: 10px;">Welcome to Main System</h1>
        <p>Доступ разрешен. Консоль деактивирована.</p>
        <button onclick="location.reload()" style="margin-top: 20px; background: #333; color: #fff; border: 1px solid #444; padding: 10px 20px; cursor: pointer;">Logout</button>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd');
        const history = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const terminal = document.getElementById('terminal');
        const mainPage = document.getElementById('main-page');
        const initContainer = document.getElementById('init-container');

        setTimeout(() => {
            history.classList.add('visible');
            inputContainer.classList.add('flex-visible');
            cmdInput.focus();
        }, 2500);

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                const line = document.createElement('div');
                line.innerHTML = `<span class="prompt">[user@arch ~]$</span> ${val}`;
                history.appendChild(line);

                if (val.toLowerCase() === 'sudo activate iris') {
                    const status = document.createElement('div');
                    status.style.color = '#55ff55';
                    status.innerText = 'System unlocked. Transitioning...';
                    history.appendChild(status);
                    
                    setTimeout(() => {
                        initContainer.style.display = 'none';
                        mainPage.classList.add('visible');
                    }, 800);
                } else if (val.toLowerCase() === 'clear') {
                    history.innerHTML = '';
                } else {
                    const error = document.createElement('div');
                    error.style.color = '#ff5555';
                    error.innerText = `sh: command not found: ${val}`;
                    history.appendChild(error);
                }

                cmdInput.value = '';
                history.scrollTop = history.scrollHeight;
            }
        });

        document.addEventListener('click', () => {
            if (!mainPage.classList.contains('visible')) {
                cmdInput.focus();
            }
        });
    </script>
</body>
</html>
