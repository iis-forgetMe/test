<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Terminal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: "Cascadia Code", "Fira Code", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #init-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #cat-face {
            font-size: 40px;
            color: #1793d1;
            position: absolute;
            filter: drop-shadow(0 0 10px rgba(23, 147, 209, 0.5));
            animation: instantSquash 0.4s cubic-bezier(0.4, 0, 1, 1) 1.5s forwards;
        }

        @keyframes instantSquash {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3, 0); opacity: 0; }
        }

        #line {
            position: absolute;
            height: 1px;
            background-color: #1793d1;
            width: 0;
            opacity: 0;
            box-shadow: 0 0 15px #1793d1;
            animation: fluidLine 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.8s forwards;
        }

        @keyframes fluidLine {
            0% { width: 0; opacity: 0; }
            20% { opacity: 1; }
            100% { width: 800px; opacity: 1; }
        }

        #terminal {
            background-color: #0c0c0c;
            width: 800px;
            height: 0;
            border-left: 1px solid #1793d1;
            border-right: 1px solid #1793d1;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            animation: fluidTerminal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.2s forwards;
        }

        @keyframes fluidTerminal {
            0% { height: 0; opacity: 1; border-top: 1px solid #1793d1; border-bottom: 1px solid #1793d1; }
            100% { height: 480px; opacity: 1; padding: 25px; border-top: 1px solid #222; border-bottom: 1px solid #222; border-left: 1px solid #222; border-right: 1px solid #222; }
        }

        #history {
            flex: 1;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInContent 0.5s ease-out 2.8s forwards;
        }

        @keyframes fadeInContent {
            to { opacity: 1; }
        }

        .input-line {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .prompt {
            color: #1793d1;
            font-weight: bold;
        }

        #cmd {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            flex: 1;
        }

        #main-page {
            display: none;
            width: 100%;
            height: 100vh;
            background: #000;
            color: #fff;
            padding: 60px;
            animation: fadeInContent 1s ease forwards;
        }

        .visible {
            display: block !important;
        }

        .flex-visible {
            display: flex !important;
        }

        .ascii {
            color: #1793d1;
            white-space: pre;
            margin-bottom: 25px;
            font-size: 12px;
            line-height: 1.2;
        }

        #history::-webkit-scrollbar { width: 4px; }
        #history::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

    <div id="init-container">
        <div id="cat-face">:3</div>
        <div id="line"></div>
        <div id="terminal">
            <div id="history">
                <div class="ascii">
                   .
                  / \
                 /   \
                /^.   \
               /  .-.  \
              /  (   )  \
             /  .-` ^ `-. \
            /  /       \  \
           /__/         \__\
                </div>
                <div>Arch Linux 6.12.1-arch1-1 (tty1)</div>
                <div style="opacity: 0.7;">System state: <span style="color: #ffaa00;">LOCKED</span></div>
                <div style="margin-top: 10px;">Type <span style="color: #fff;">"sudo activate Iris"</span> to proceed.</div>
                <br>
            </div>
            <div class="input-line" id="input-container">
                <span class="prompt">[user@arch ~]$</span>
                <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off">
            </div>
        </div>
    </div>

    <div id="main-page">
        <h1 style="border-bottom: 1px solid #1793d1; padding-bottom: 15px; display: inline-block;">System Shell</h1>
        <p style="margin-top: 20px; font-size: 18px;">Доступ успешно активирован.</p>
        <p style="color: #888;">Вы вошли в защищенную среду.</p>
        <button onclick="location.reload()" style="margin-top: 40px; background: transparent; color: #1793d1; border: 1px solid #1793d1; padding: 10px 25px; cursor: pointer; transition: 0.3s;" onmouseover="this.style.background='#1793d1'; this.style.color='#000'" onmouseout="this.style.background='transparent'; this.style.color='#1793d1'">Выйти</button>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd');
        const history = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const terminal = document.getElementById('terminal');
        const mainPage = document.getElementById('main-page');
        const initContainer = document.getElementById('init-container');

        setTimeout(() => {
            inputContainer.classList.add('flex-visible');
            cmdInput.focus();
        }, 3000);

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                const line = document.createElement('div');
                line.innerHTML = `<span class="prompt">[user@arch ~]$</span> ${val}`;
                history.appendChild(line);

                if (val.toLowerCase() === 'sudo activate iris') {
                    const status = document.createElement('div');
                    status.style.color = '#55ff55';
                    status.style.marginTop = '10px';
                    status.innerText = 'Authorization successful...';
                    history.appendChild(status);
                    
                    setTimeout(() => {
                        initContainer.style.transition = 'opacity 0.6s ease';
                        initContainer.style.opacity = '0';
                        setTimeout(() => {
                            initContainer.style.display = 'none';
                            mainPage.classList.add('visible');
                        }, 600);
                    }, 500);
                } else if (val.toLowerCase() === 'clear') {
                    history.innerHTML = '';
                } else if (val !== '') {
                    const error = document.createElement('div');
                    error.style.color = '#ff5555';
                    error.innerText = `sh: command not found: ${val}`;
                    history.appendChild(error);
                }

                cmdInput.value = '';
                history.scrollTop = history.scrollHeight;
            }
        });

        document.addEventListener('click', () => {
            if (!mainPage.classList.contains('visible')) {
                cmdInput.focus();
            }
        });
    </script>
</body>
</html>
